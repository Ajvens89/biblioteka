<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="felt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d4a3e"/>
      <stop offset="50%" stop-color="#1e3329"/>
      <stop offset="100%" stop-color="#152820"/>
    </linearGradient>
    <linearGradient id="wood" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5c4033"/>
      <stop offset="100%" stop-color="#3d2a22"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="#1a1428"/>
  <ellipse cx="600" cy="420" rx="520" ry="340" fill="url(#wood)" opacity="0.85"/>
  <ellipse cx="600" cy="400" rx="460" ry="290" fill="url(#felt)" opacity="0.92"/>
  <!-- cards -->
  <g opacity="0.55" transform="translate(180 220) rotate(-18)">
    <rect x="0" y="0" width="88" height="124" rx="8" fill="#f8f4ec" stroke="#c9a84c" stroke-width="2"/>
    <rect x="12" y="16" width="64" height="8" rx="4" fill="#8b6cc1" opacity="0.5"/>
    <rect x="12" y="32" width="48" height="6" rx="3" fill="#8b6cc1" opacity="0.35"/>
  </g>
  <g opacity="0.5" transform="translate(230 200) rotate(-8)">
    <rect x="0" y="0" width="88" height="124" rx="8" fill="#fffef8" stroke="#c9a84c" stroke-width="2"/>
    <circle cx="44" cy="62" r="22" fill="#c9922e" opacity="0.35"/>
  </g>
  <g opacity="0.45" transform="translate(860 180) rotate(14)">
    <rect x="0" y="0" width="88" height="124" rx="8" fill="#f0ebe0" stroke="#7c6bae" stroke-width="2"/>
    <path d="M20 90 L68 90 L44 40 Z" fill="#7c6bae" opacity="0.3"/>
  </g>
  <!-- d20 -->
  <g transform="translate(920 420)" opacity="0.7">
    <polygon points="0,-52 49,26 -49,26" fill="#7c6bae"/>
    <polygon points="0,-52 49,26 0,52" fill="#5c4a8a"/>
    <polygon points="0,52 -49,26 49,26" fill="#9b7fd4"/>
    <text x="0" y="8" text-anchor="middle" fill="white" font-size="22" font-weight="bold" font-family="system-ui">20</text>
  </g>
  <!-- d6 -->
  <g transform="translate(140 480) rotate(-12)" opacity="0.75">
    <rect x="-36" y="-36" width="72" height="72" rx="12" fill="#e8b84a"/>
    <rect x="-36" y="-36" width="72" height="72" rx="12" fill="none" stroke="#c9922e" stroke-width="3"/>
    <circle cx="-14" cy="-14" r="6" fill="#2a1f42"/>
    <circle cx="14" cy="14" r="6" fill="#2a1f42"/>
    <circle cx="0" cy="0" r="6" fill="#2a1f42"/>
    <circle cx="-14" cy="14" r="6" fill="#2a1f42"/>
    <circle cx="14" cy="-14" r="6" fill="#2a1f42"/>
    <circle cx="0" cy="-14" r="6" fill="#2a1f42"/>
  </g>
  <!-- RPG book -->
  <g transform="translate(980 560) rotate(8)" opacity="0.6">
    <rect x="0" y="0" width="110" height="140" rx="4" fill="#3d2d5c"/>
    <rect x="8" y="8" width="94" height="124" rx="2" fill="#2a1f42"/>
    <rect x="16" y="24" width="60" height="6" rx="3" fill="#c9922e" opacity="0.7"/>
    <rect x="16" y="40" width="78" height="4" rx="2" fill="#8b6cc1" opacity="0.5"/>
    <rect x="16" y="52" width="70" height="4" rx="2" fill="#8b6cc1" opacity="0.4"/>
    <path d="M55 80 L75 110 L35 110 Z" fill="#c9922e" opacity="0.35"/>
  </g>
  <!-- meeples / tokens -->
  <circle cx="420" cy="520" r="18" fill="#c45c5c" opacity="0.55"/>
  <circle cx="460" cy="540" r="18" fill="#4a90c4" opacity="0.5"/>
  <circle cx="500" cy="510" r="18" fill="#5cb85c" opacity="0.5"/>
  <circle cx="680" cy="500" r="18" fill="#e8b84a" opacity="0.55"/>
  <circle cx="720" cy="530" r="18" fill="#8b6cc1" opacity="0.5"/>
  <!-- subtle vignette -->
  <rect width="1200" height="800" fill="url(#vignette)" opacity="0.4"/>
  <defs>
    <radialGradient id="vignette" cx="50%" cy="45%" r="65%">
      <stop offset="40%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#1a1428"/>
    </radialGradient>
  </defs>
</svg>
