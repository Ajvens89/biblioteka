services:
  postgres:
    image: postgres:16-alpine
    container_name: biblioteka-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: biblioteka
      POSTGRES_PASSWORD: biblioteka
      POSTGRES_DB: biblioteka
    volumes:
      - biblioteka_pg_data:/var/lib/postgresql/data

volumes:
  biblioteka_pg_data:
