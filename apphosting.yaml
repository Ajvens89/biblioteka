# Firebase App Hosting — Biblioteka Zakątka Fantastyki
# Sekrety (DATABASE_URL) → Firebase Console → Environment lub: firebase apphosting:secrets:set

runConfig:
  minInstances: 1
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 1024

scripts:
  buildCommand: npm install --no-audit --no-fund && npm run build

env:
  - variable: AUTH_PROVIDER
    value: local
    availability:
      - BUILD
      - RUNTIME
  - variable: ALLOW_LOCAL_AUTH_IN_PRODUCTION
    value: "true"
    availability:
      - BUILD
      - RUNTIME
  # Placeholder na build; produkcyjny sekret → Secret Manager (scripts/set-firebase-auth-secret.ps1)
  - variable: AUTH_SECRET
    value: build-time-auth-secret-placeholder-32chars!!
    availability:
      - BUILD
  - variable: AUTH_SECRET
    secret: AUTH_SECRET
    availability:
      - RUNTIME
  - variable: APP_URL
    value: https://bookshelf--bibl-2c364.europe-west4.hosted.app
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_APP_URL
    value: https://bookshelf--bibl-2c364.europe-west4.hosted.app
    availability:
      - BUILD
      - RUNTIME
  # Placeholder na build (prisma generate); prawdziwe URL z Secret Manager w runtime
  - variable: DATABASE_URL
    value: postgresql://build:build@127.0.0.1:5432/build?sslmode=disable
    availability:
      - BUILD
  - variable: DIRECT_URL
    value: postgresql://build:build@127.0.0.1:5432/build?sslmode=disable
    availability:
      - BUILD
  - variable: DATABASE_URL
    secret: DATABASE_URL
    availability:
      - RUNTIME
  - variable: DIRECT_URL
    secret: DIRECT_URL
    availability:
      - RUNTIME
  - variable: GOOGLE_GEMINI_MODEL
    value: gemini-flash-latest
    availability:
      - RUNTIME
  - variable: GOOGLE_GEMINI_API_KEY
    secret: GOOGLE_GEMINI_API_KEY
    availability:
      - RUNTIME
  - variable: CRON_SECRET
    secret: CRON_SECRET
    availability:
      - RUNTIME
  # Opcjonalnie: zdalne CSV z Firebase Storage (scripts/upload-catalog-csv.ts)
  # - variable: HURT_CSV_URL
  #   value: https://firebasestorage.googleapis.com/v0/b/bibl-2c364.appspot.com/o/catalog%2Fhurt.csv?alt=media
  #   availability:
  #     - RUNTIME
